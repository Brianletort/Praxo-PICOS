services:
  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "${PRAXO_QDRANT_HTTP_PORT:-6733}:6333"
      - "${PRAXO_QDRANT_GRPC_PORT:-6734}:6334"
    volumes:
      - "${PRAXO_QDRANT_DIR:-./qdrant_data}:/qdrant/storage"
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
