name: ci-nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  python-regression-performance:
    name: python-regression-performance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run regression + performance + integration
        run: pytest -m "regression or performance or integration" --timeout=300

  macos-smoke:
    name: macos-smoke
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify repo structure
        run: |
          test -f Makefile
          test -f pyproject.toml
          test -d services
          test -d apps

      - name: Install and run smoke tests
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest -m "smoke" --timeout=60
