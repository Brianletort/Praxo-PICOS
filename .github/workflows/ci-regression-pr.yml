name: ci-regression-pr

on:
  pull_request:

jobs:
  regression-fast:
    name: regression-fast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install web deps
        run: cd apps/web && npm install

      - name: Run fast regression
        run: make regression-fast

      - name: Check regression monotonicity
        run: make check-regression-monotonicity
