name: ci-fast

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-lint-typecheck:
    name: python-lint-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy services packages tests

  python-tests-fast:
    name: python-tests-fast
    runs-on: ubuntu-latest
    needs: [python-lint-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run fast pytest suite
        run: pytest -m "unit or contract or smoke" --timeout=60

  web-tests-fast:
    name: web-tests-fast
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Run Vitest
        run: npm run test:run

      - name: Typecheck
        run: npm run typecheck
