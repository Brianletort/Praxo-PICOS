<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="24" fill="url(#grad)"/>
  <!-- Brain/network node motif -->
  <circle cx="60" cy="42" r="8" fill="none" stroke="#fff" stroke-width="2.5"/>
  <circle cx="38" cy="68" r="6" fill="none" stroke="#fff" stroke-width="2"/>
  <circle cx="82" cy="68" r="6" fill="none" stroke="#fff" stroke-width="2"/>
  <circle cx="48" cy="90" r="5" fill="none" stroke="#fff" stroke-width="1.8"/>
  <circle cx="72" cy="90" r="5" fill="none" stroke="#fff" stroke-width="1.8"/>
  <!-- Connections -->
  <line x1="54" y1="48" x2="42" y2="64" stroke="#fff" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="66" y1="48" x2="78" y2="64" stroke="#fff" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="38" y1="74" x2="48" y2="86" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="82" y1="74" x2="72" y2="86" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="44" y1="68" x2="76" y2="68" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="52" y1="88" x2="68" y2="88" stroke="#fff" stroke-width="1.3" stroke-linecap="round" opacity="0.4"/>
  <!-- Node fills (dots) -->
  <circle cx="60" cy="42" r="3" fill="#fff"/>
  <circle cx="38" cy="68" r="2.5" fill="#fff"/>
  <circle cx="82" cy="68" r="2.5" fill="#fff"/>
  <circle cx="48" cy="90" r="2" fill="#fff"/>
  <circle cx="72" cy="90" r="2" fill="#fff"/>
</svg>
